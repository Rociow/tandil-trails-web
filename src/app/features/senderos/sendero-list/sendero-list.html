<app-navbar></app-navbar>
<div class="senderos-container">
  @if (cargando()) {
  <mat-spinner />
  } @else {
  <mat-card class="header-card">
    <mat-card-header>
      <mat-card-title>Senderos Tandil</mat-card-title>
    </mat-card-header>
  </mat-card>

  <div class="senderos-list">
    @for (sendero of senderos; track sendero.id) {
    <app-sendero-card [sendero]="sendero" />
    }
  </div>
  }
</div>
